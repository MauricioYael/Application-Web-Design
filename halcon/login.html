<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halcón — Acceso al Sistema</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">

  <div class="login-card">
    <h1>🦅 Halcón</h1>
    <p class="subtitle">Distribuidora de Materiales</p>

    <div id="error-msg" class="error-msg hidden">
      Usuario o contraseña incorrectos
    </div>

    <div class="form-group">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" placeholder="Ingresa tu usuario">
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Ingresa tu contraseña">
    </div>

    <button onclick="iniciarSesion()">Entrar</button>

    <a href="index.html" class="link-consulta">
      ¿Eres cliente? Consulta tu pedido aquí
    </a>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
